############################################################
# PREFIX
############################################################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

############################################################
# CORE OPTIONS
############################################################

set -g escape-time 0             # no ESC delay (critical for nvim)
set -g focus-events on           # pass FocusGained/Lost to nvim
set -g mouse on                  # scroll, click pane/window
set -g history-limit 100000      # scrollback buffer size
set -g set-clipboard on          # clipboard integration
set -g window-size largest       # use largest attached client size
set -g xterm-keys on

# Window / pane numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on       # re-number windows on close

############################################################
# TRUE COLOR + OSC52
############################################################

set-option -g default-shell /bin/zsh
set-option -g default-command "${SHELL} -l"
set -g  default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -g  allow-passthrough on
set -ag terminal-overrides ",*:Ms=\\E]52;%p1%s;%p2%s\\007"

############################################################
# KEY BINDINGS — GENERAL
############################################################

bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window        -c "#{pane_current_path}"
bind C new-window        -c "#{HOME}"

bind z resize-pane -Z
bind x kill-pane
bind X kill-window

############################################################
# KEY BINDINGS — RESIZE  (no prefix)
############################################################

bind -n C-S-h  resize-pane -L 5
bind -n C-S-l resize-pane -R 5
bind -n C-S-k    resize-pane -U 5
bind -n C-S-j  resize-pane -D 5

############################################################
# KEY BINDINGS — SEAMLESS NVIM ↔ TMUX NAVIGATION  (no prefix)
############################################################

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | rg -iq '^[^TXZ ]+ +(\S+\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

############################################################
# KEY BINDINGS — COPY MODE  (vi keys)
############################################################

setw -g mode-keys vi

bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi V      send -X select-line
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

############################################################
# KEY BINDINGS — PANE LAYOUT PRESETS  (prefix + R + 1/2/3)
############################################################

bind R switch-client -T layouts

bind -T layouts 1 \
  split-window -h -p 40 -c "#{pane_current_path}" \;\
  split-window -v -p 50 -c "#{pane_current_path}" \;\
  select-pane -t 1

bind -T layouts 2 \
  split-window -h -p 40 -c "#{pane_current_path}" \;\
  select-pane -L \;\
  split-window -v -p 50 -c "#{pane_current_path}" \;\
  select-pane -R

bind -T layouts 3 \
  split-window -h -p 50 -c "#{pane_current_path}" \;\
  split-window -v -p 50 -c "#{pane_current_path}" \;\
  select-pane -L \;\
  split-window -v -p 50 -c "#{pane_current_path}" \;\
  select-pane -U

############################################################
# CATPPUCCIN THEME
############################################################

set -g @catppuccin_flavor 'frappe'

set -g @catppuccin_window_status_style    'basic'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_flags           'yes'
set -g @catppuccin_window_current_number_color '#8aadf4'
set -g @catppuccin_window_current_text    ' #W'
set -g @catppuccin_window_text            ' #W'

set -g @catppuccin_pane_border_style "fg=#{@thm_surface_1}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_surface_1}"

set -g @catppuccin_status_position      'bottom'
set -g @catppuccin_status_modules_left  ''
set -g @catppuccin_status_modules_right ''

############################################################
# PLUGINS (TPM)
############################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

run '~/.tmux/plugins/tpm/tpm'

############################################################
# STATUS BAR & TMUXD
#
# Left  : [session name]
# Right : [󰉋 path  •  󰘬 repo:branch dirty  •  󰚩 model  •  db icons  •  docker  •  dev icons]
############################################################

set -g status-left         '[#{session_name}]  '
set -g status-left-length  50
set -g status-right-length 400
set -g status-interval     5

# Hooks cho tmuxd
set-hook -g pane-focus-in        "refresh-client -S"
set-hook -g after-select-pane    "refresh-client -S"
set-hook -g after-select-window  "refresh-client -S"
set-hook -g after-split-window   "refresh-client -S"
set-hook -g pane-exited          "refresh-client -S"
set-hook -g after-new-window     "refresh-client -S"

# Auto-start tmuxd daemon
set-hook -g session-created \
  "run-shell 'pgrep -x tmuxd > /dev/null || nohup $HOME/.local/bin/tmuxd daemon > /tmp/tmuxd.log 2>&1 &'"

set -g status-right "#($HOME/.local/bin/tmuxd status #{pane_id} #{pane_current_path})"
